# ==============================================================================
# Publications 数据文件
# ------------------------------------------------------------------------------
# 支持字段：
#   title            论文标题（必填）
#   authors          作者列表：本人用 <span class="pub-self">Sun Ao</span>
#   conference       期刊/会议全名
#   conference_short 简称 badge（显示在封面图上）
#   image            配图路径 assets/img/publications/xxx.png
#   pdf              PDF / DOI 链接
#   code             GitHub 代码仓库链接
#   page             项目主页链接
#   bibtex           BibTeX 文件链接
#   notes            特殊标记，支持多个用逗号分隔，例如：
#                    "Highly Cited · ESI" / "Oral" / "Best Paper"
#   highlight        一句话亮点介绍（斜体，显示在期刊名下方）
# ==============================================================================

